trigger:
  branches:
    include:
      - main
      - next
      - feat/*
      - fix/*
  paths:
    include:
      - projects/ngx-twcss/src/*
      - azure-pipelines.yaml

pool:
  name: Continuous Integration
  demands:
    - Agent.OS -equals Linux

variables:
  - name: MajorMinor
    value: "0.0"
  - name: Patch
    value: $[counter(variables.MajorMinor, 67)]
  - name: Release
    value: $(MajorMinor).$(Patch)

name: $(Build.DefinitionName)-v${{variables.Release}}

stages:
  - stage: CI
    jobs:
      - job: Build_Test_Publish
        steps:
          - bash: |
              sed '/file\:dist\/ngx-twcss/d' -i package.json
              yarn
            displayName: "Setup"
            env:
              YARN_ENABLE_IMMUTABLE_INSTALLS: false

          - bash: |
              yarn build:package
              echo $(Build.SourceVersion) > dist/ngx-twcss/source_version.txt
            displayName: "Build package v$(Release)"

          - bash: |
              Xvfb -ac :0 -screen 0 1280x1024x16 -nolisten unix & export DISPLAY=:0
              yarn test:package:ci
            displayName: "Test package v$(Release)"

          - publish: $(Build.SourcesDirectory)/dist/ngx-twcss
            artifact: package
            displayName: "Publish package v$(Release)"

          - task: PublishTestResults@2
            displayName: "Publish test results"
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "**/TESTS-*.xml"
              searchFolder: "$(Build.SourcesDirectory)"
              mergeTestResults: true
              testRunTitle: "Test-results-$(Build.DefinitionName)-$(Release)"

          - task: PublishCodeCoverageResults@2
            displayName: "Publish code coverage"
            inputs:
              summaryFileLocation: "$(Build.SourcesDirectory)/coverage/ngx-twcss/cobertura.xml"
              pathToSources: "$(Build.SourcesDirectory)/coverage/ngx-twcss"

          - ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
            - bash: |
                yarn add ngx-twcss@file:dist/ngx-twcss
                yarn build:demo
              displayName: "Build demo v$(Release)"

            - publish: $(Build.SourcesDirectory)/dist/ngx-twcss-demo
              artifact: demo
              displayName: "Publish demo v$(Release)"

  - ${{ if or(in(variables['Build.SourceBranchName'], 'main', 'next'), or(contains(variables['Build.SourceBranch'], 'feat/'), contains(variables['Build.SourceBranch'], 'fix/'))) }}:
    - stage: CD
      dependsOn: CI
      jobs:
        - job: Release
          steps:
            - checkout: none
            - download: current
              artifact: package
              displayName: Download package v$(Release)

            - ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
                - download: current
                  artifact: demo
                  displayName: Download demo v$(Release)

                - bash: |
                    sed 's/0.0.0-placeholder/$(Release)/g' -i package.json
                    npm config set //registry.npmjs.org/:_authToken=$(authToken)
                    npm publish
                    npm publish --tag $(cat source_version.txt | cut -c1-7)
                  displayName: "Release package v$(Release)"
                  workingDirectory: $(Pipeline.Workspace)/package

                - script: |
                    # Remove the previous latest release
                    rm -rf /azp/www/ngx-twcss/blue/*
                    # Copy the current latest release to the blue directory
                    cp -rp /azp/www/ngx-twcss/green/* /azp/www/ngx-twcss/blue
                    # Copy the new release to the green directory
                    cp -rfp . /azp/www/ngx-twcss/green
                  displayName: "Release demo v$(Release)"
                  workingDirectory: $(Pipeline.Workspace)/demo

            - ${{ elseif eq(variables['Build.SourceBranchName'], 'next') }}:
                - bash: |
                    release_version="$(Release)-next.$(cat source_version.txt | cut -c1-7)"
                    sed "s/0.0.0-placeholder/$release_version/g" -i package.json
                    npm config set //registry.npmjs.org/:_authToken=$(authToken)
                    npm publish --tag next
                  displayName: "Release package v$(Release)-next"
                  workingDirectory: $(Pipeline.Workspace)/package

            - ${{ else }}:
                - bash: |
                    release_version="$(Release)-insiders.$(cat source_version.txt | cut -c1-7)"
                    sed "s/0.0.0-placeholder/$release_version/g" -i package.json
                    npm config set //registry.npmjs.org/:_authToken=$(authToken)
                    npm publish --tag insiders
                  displayName: "Release package v$(Release)-insiders"
                  workingDirectory: $(Pipeline.Workspace)/package
